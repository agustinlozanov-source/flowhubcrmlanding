<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenido — Flow Hub CRM</title>
  <link rel="icon" type="image/png" href="Icono%20Flow%20Hub%20CRM.png">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --blue: #1aab99; --purple: #3533cd; }

    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #ffffff; }

    /* VIDEO FULL-SCREEN */
    .video-bg { position: fixed; inset: 0; z-index: 0; }
    .video-bg video { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* LOGO — top left */
    .logo-wrap {
      position: fixed; top: 28px; left: 36px; z-index: 2;
      opacity: 0; animation: fadeDown 0.7s ease 0.1s forwards;
    }
    .logo-wrap img { height: 36px; }

    /* BADGE — bottom center, paralelo al botón Welcome */
    .badge-wrap {
      position: relative; display: inline-block;
      opacity: 0; animation: fadeUp 0.8s ease 0.3s forwards;
    }
    /* gradient border */
    .badge-wrap::before {
      content: ''; position: absolute; inset: 0; border-radius: 50px; padding: 2px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude; pointer-events: none;
    }
    .badge-pill {
      display: inline-flex; align-items: center;
      padding: 15px 44px; border-radius: 50px; background: transparent;
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; font-weight: 800;
      letter-spacing: -0.2px; white-space: nowrap;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* OVERLAY — badge + botón en fila, bottom center */
    .overlay {
      position: fixed; inset: 0; z-index: 1;
      display: flex; flex-direction: row; align-items: center;
      justify-content: center; align-items: flex-end; padding-bottom: 64px;
      gap: 16px; pointer-events: none;
    }

    /* BOTÓN */
    .btn-welcome {
      position: relative; display: inline-flex; align-items: center; gap: 10px;
      padding: 15px 44px; border-radius: 50px;
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; font-weight: 800;
      letter-spacing: -0.2px; border: none; cursor: pointer;
      background: transparent; text-decoration: none;
      transition: transform 0.18s ease;
      opacity: 0; animation: fadeUp 0.8s ease 0.45s forwards;
      pointer-events: auto;
    }
    /* gradient border */
    .btn-welcome::before {
      content: ''; position: absolute; inset: 0; border-radius: 50px; padding: 2px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude; pointer-events: none;
    }
    .btn-welcome:hover { transform: translateY(-3px) scale(1.03); }
    .btn-welcome:active { transform: translateY(0) scale(0.99); }

    /* gradient text */
    .btn-text {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    /* gradient dot */
    .btn-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.65); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- VIDEO FONDO FULL-SCREEN -->
  <div class="video-bg">
    <video autoplay muted loop playsinline>
      <source src="Video_Generado_con_Animación.mp4" type="video/mp4">
    </video>
  </div>

  <!-- LOGO — top left -->
  <div class="logo-wrap">
    <img src="flow hub logo 1.png" alt="Flow Hub CRM">
  </div>

  <!-- BADGE + BOTÓN — bottom center, paralelos -->
  <div class="overlay">
    <div class="badge-wrap">
      <div class="badge-pill">AI for Sales</div>
    </div>
    <a href="/landing.html" class="btn-welcome">
      <div class="btn-dot"></div>
      <span class="btn-text">Welcome</span>
    </a>
  </div>

</body>
</html>
